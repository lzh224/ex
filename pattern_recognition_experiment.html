<body>
<div id="app"></div>

<script>
/* =====================================================================
 * 模式识别 — 模板说实验复现
 * 复现自:
 *   Phillips, W. A. (1974). On the distinction between sensory storage
 *   and short-term visual memory.
 *   Perception & Psychophysics, 16(2), 283-290.
 *
 * 实验设计概要:
 *   - 给被试呈现一个由随机单元格组成的方格矩阵 (Pattern A)
 *   - 经过短暂的 ISI (刺激间隔) 之后, 呈现 Pattern B
 *   - Pattern B 与 Pattern A 完全相同, 或仅有 1 个单元格不同
 *   - 被试判断 "是否相同"
 *
 * 自变量:
 *   1. 矩阵尺寸 (复杂度): 5×5 / 8×8
 *   2. ISI: 20, 60, 100, 300, 600 (毫秒)
 *   3. 位移条件: still (不动) / move (Pattern B 整体水平平移一格)
 *   4. 试次类型: same (相同) / different (1 个单元格不同)
 *
 * 因变量: 判断正确率, 反应时
 * ===================================================================== */

/* ---------- 配置 ---------- */
const CONFIG = {
  matrixSizes: [5, 8],
  isiValues: [20, 60, 100, 300, 600],   // 毫秒, 对应 0.02, 0.06, 0.1, 0.3, 0.6 秒
  shiftConditions: [false, true],
  sameDiffConditions: [true, false],

  // 时间参数 (毫秒)
  fixationDuration: 500,
  patternDuration: 1000,           // Pattern A 呈现时长
  feedbackDuration: 700,
  interTrialInterval: 600,
  breakInterval: 40,               // 每 N 试次提供一次休息

  // 显示参数
  cellSizeFor5: 36,
  cellSizeFor8: 26,
  cellGap: 1,                      // 单元格之间的间隙

  // 默认实验参数
  defaultReps: 3,
  practiceTrialCount: 6,

  // 反应键
  sameKey: 's',
  diffKey: 'd',
};

/* ---------- 状态 ---------- */
const state = {
  screen: 'welcome',
  config: {
    reps: CONFIG.defaultReps,
    includeShift: true,
    sizes: [...CONFIG.matrixSizes],
    isis: [...CONFIG.isiValues],
    participantId: '',
  },
  trials: [],
  currentTrialIdx: 0,
  practiceTrials: [],
  practiceIdx: 0,
  isPractice: false,
  conclusion: '',
};

/* ---------- 工具函数 ---------- */
function shuffle(arr) {
  // Fisher-Yates 洗牌
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function wait(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

/* ---------- 矩阵生成 ---------- */
function generateMatrix(size) {
  // 严格 50% 填充: 总单元格数的一半填充, 然后随机洗牌
  // 这样保证每个矩阵的填充密度一致, 排除密度变量
  const total = size * size;
  const fillCount = Math.floor(total / 2);
  const cells = [];
  for (let i = 0; i < total; i++) cells.push(i < fillCount ? 1 : 0);
  shuffle(cells);
  const matrix = [];
  for (let r = 0; r < size; r++) {
    matrix.push(cells.slice(r * size, (r + 1) * size));
  }
  return matrix;
}

function flipOneCell(matrix) {
  // 复制矩阵, 然后翻转其中一个随机单元格 -> "different" 试次
  const size = matrix.length;
  const newMatrix = matrix.map(row => [...row]);
  const r = Math.floor(Math.random() * size);
  const c = Math.floor(Math.random() * size);
  newMatrix[r][c] = 1 - newMatrix[r][c];
  return newMatrix;
}

function copyMatrix(matrix) {
  return matrix.map(row => [...row]);
}

/* ---------- 试次生成 ---------- */
function generateTrials(config) {
  const trials = [];
  const shiftConds = config.includeShift ? [false, true] : [false];
  for (let rep = 0; rep < config.reps; rep++) {
    for (const size of config.sizes) {
      for (const isi of config.isis) {
        for (const shift of shiftConds) {
          for (const same of CONFIG.sameDiffConditions) {
            trials.push({
              size, isi, shift, same,
              matrix1: null, matrix2: null,
              response: null, correct: null, rt: null,
            });
          }
        }
      }
    }
  }
  return shuffle(trials);
}

function generatePracticeTrials() {
  // 6 个练习试次, 涵盖各种条件组合, 帮助被试熟悉任务
  const conditions = [
    { size: 5, isi: 300, shift: false, same: true },
    { size: 5, isi: 300, shift: false, same: false },
    { size: 8, isi: 300, shift: false, same: true },
    { size: 8, isi: 300, shift: false, same: false },
    { size: 5, isi: 100, shift: true, same: true },
    { size: 8, isi: 100, shift: true, same: false },
  ];
  return shuffle(conditions.map(c => ({
    ...c, matrix1: null, matrix2: null,
    response: null, correct: null, rt: null,
  })));
}

/* ---------- 矩阵渲染 (D3) ---------- */
function renderMatrix(svgSelection, matrix, options = {}) {
  // options: { cellSize, shiftPx, offsetX, offsetY }
  const size = matrix.length;
  const cellSize = options.cellSize || (size === 5 ? CONFIG.cellSizeFor5 : CONFIG.cellSizeFor8);
  const gap = CONFIG.cellGap;
  const totalSize = size * cellSize + (size - 1) * gap;
  const shiftPx = options.shiftPx || 0;

  // 准备 cell 数据
  const cells = [];
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      cells.push({ r, c, value: matrix[r][c] });
    }
  }

  svgSelection.selectAll('*').remove();

  const w = +svgSelection.attr('width');
  const h = +svgSelection.attr('height');
  // 居中, 然后应用水平位移
  const offsetX = (w - totalSize) / 2 + shiftPx;
  const offsetY = (h - totalSize) / 2;

  const g = svgSelection.append('g')
    .attr('transform', `translate(${offsetX}, ${offsetY})`);

  g.selectAll('rect')
    .data(cells)
    .enter()
    .append('rect')
    .attr('class', d => 'matrix-cell ' + (d.value ? 'filled' : 'empty'))
    .attr('x', d => d.c * (cellSize + gap))
    .attr('y', d => d.r * (cellSize + gap))
    .attr('width', cellSize)
    .attr('height', cellSize);
}

/* ---------- 屏幕切换 ---------- */
function showScreen(name) {
  state.screen = name;
  render();
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  const renderers = {
    welcome: renderWelcome,
    settings: renderSettings,
    instructions: renderInstructions,
    practice: renderExperimentScreen,
    experiment: renderExperimentScreen,
    results: renderResults,
  };
  (renderers[state.screen] || renderWelcome)();
}

/* ---------- 欢迎页 ---------- */
function renderWelcome() {
  const app = document.getElementById('app');
  const div = document.createElement('div');
  div.className = 'menu-screen';
  div.innerHTML = `
    <h1>模式识别 — 模板说实验复现</h1>
    <div class="subtitle">认知心理学基础 · 经典实验复现</div>

    <h2>实验背景</h2>
    <p>
      本实验复现 Phillips (1974) 经典实验, 用于检验认知心理学中模式识别的<strong>模板说</strong>
      (Template Matching Theory)。模板说认为, 人脑长时记忆中贮存有各种模式的"复本"
      (即模板), 当外部刺激出现时, 大脑会将刺激与已贮存的模板进行逐一比对, 找到最佳匹配。
    </p>

    <div class="info-box">
      <strong>核心问题:</strong> 如果模板匹配真的存在, 那么当两个待比较的图案
      在<strong>空间位置上重叠</strong>时, 识别效果应当显著优于位置不重叠的情况
      (因为后者无法直接进行模板叠加)。
    </div>

    <h2>实验任务</h2>
    <p>实验中, 你将看到由黑白单元格组成的方格矩阵 (Pattern A), 短暂消失后又会
       出现第二个矩阵 (Pattern B)。两个矩阵<strong>要么完全相同, 要么仅有 1 个单元格
       不同</strong>。你的任务是尽快、准确地判断它们是否相同。</p>

    <p>实验包含 4 个自变量:</p>
    <ul>
      <li><strong>矩阵复杂度:</strong> 5×5 (25 格) 或 8×8 (64 格)</li>
      <li><strong>刺激间隔 (ISI):</strong> 20, 60, 100, 300, 600 毫秒</li>
      <li><strong>位移条件:</strong> Pattern B 与 Pattern A 位置完全重叠 (still),
          或整体水平平移一个单元格宽度 (move)</li>
      <li><strong>试次类型:</strong> 相同 / 不同 (各占一半)</li>
    </ul>

    <p class="citation">
      参考文献: Phillips, W. A. (1974). On the distinction between sensory
      storage and short-term visual memory. <em>Perception & Psychophysics, 16</em>(2),
      283–290.
    </p>

    <div class="btn-row">
      <button class="btn" onclick="showScreen('settings')">开始 →</button>
    </div>
  `;
  app.appendChild(div);
}

/* ---------- 配置页 ---------- */
function renderSettings() {
  const app = document.getElementById('app');
  const div = document.createElement('div');
  div.className = 'menu-screen';
  div.innerHTML = `
    <h1>实验配置</h1>
    <div class="subtitle">在开始前, 请配置本次实验的参数</div>

    <h2>被试信息</h2>
    <div class="config-row">
      <label>被试编号 / 姓名:</label>
      <input type="text" id="cfg-pid" value="${state.config.participantId}"
             style="padding:6px 10px;border:1px solid #d2d2d7;border-radius:6px;font-size:14px;width:220px;">
    </div>

    <h2>实验参数</h2>

    <div class="config-row">
      <label>每条件重复次数:</label>
      <input type="number" id="cfg-reps" min="1" max="10" value="${state.config.reps}">
      <span class="hint">默认 3 次, 共 <strong id="cfg-trial-count">—</strong>
        个试次, 约 <strong id="cfg-time-est">—</strong> 分钟</span>
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="cfg-shift" ${state.config.includeShift ? 'checked' : ''}>
      <label for="cfg-shift">包含位移条件 (still / move 对照)</label>
    </div>

    <div class="info-box">
      <strong>关于位移条件 (对照设计):</strong>
      在 50% 的试次中, Pattern B 会相对于 Pattern A 整体水平平移一个单元格宽度。
      这一对照条件是检验"模板匹配是否依赖空间位置重叠"的关键。
      <strong>强烈建议保留此条件</strong>, 否则将无法验证模板说的核心预测。
    </div>

    <h2>固定参数 (按 Phillips 1974 原文)</h2>
    <ul>
      <li>矩阵尺寸: 5×5, 8×8</li>
      <li>ISI: 20, 60, 100, 300, 600 ms</li>
      <li>Pattern A 呈现时长: 1000 ms</li>
      <li>试次类型 (same/diff) 各占 50%</li>
      <li>所有试次随机排序</li>
    </ul>

    <div class="btn-row">
      <button class="btn-secondary btn" onclick="showScreen('welcome')">← 返回</button>
      <button class="btn" onclick="onConfirmSettings()">确认并开始 →</button>
    </div>
  `;
  app.appendChild(div);

  // 实时更新试次数和预估时间
  const repsInput = document.getElementById('cfg-reps');
  const shiftInput = document.getElementById('cfg-shift');
  function updateEst() {
    const reps = +repsInput.value || 1;
    const shifts = shiftInput.checked ? 2 : 1;
    const trialCount = reps * 2 * 5 * shifts * 2;  // sizes × isis × shifts × sameDiff
    // 每试次估算: fixation 0.5 + pattern 1.0 + ISI ~0.2 + 反应 ~1.5 + ITI 0.6 = ~3.8s
    const minutes = Math.ceil(trialCount * 3.8 / 60);
    document.getElementById('cfg-trial-count').textContent = trialCount;
    document.getElementById('cfg-time-est').textContent = minutes;
  }
  repsInput.addEventListener('input', updateEst);
  shiftInput.addEventListener('change', updateEst);
  updateEst();
}

function onConfirmSettings() {
  state.config.reps = Math.max(1, +document.getElementById('cfg-reps').value || 1);
  state.config.includeShift = document.getElementById('cfg-shift').checked;
  state.config.participantId = document.getElementById('cfg-pid').value.trim() || 'anonymous';
  state.trials = generateTrials(state.config);
  state.practiceTrials = generatePracticeTrials();
  state.currentTrialIdx = 0;
  state.practiceIdx = 0;
  showScreen('instructions');
}

/* ---------- 指导语 ---------- */
function renderInstructions() {
  const app = document.getElementById('app');
  const div = document.createElement('div');
  div.className = 'menu-screen';
  div.innerHTML = `
    <h1>实验指导</h1>

    <h2>任务流程 (每个试次)</h2>
    <ol>
      <li>屏幕中央会出现一个白色注视点 "+", 请注视它。</li>
      <li>然后第一个方格矩阵 (Pattern A) 会呈现 1 秒, 请尽量记住整体图案。</li>
      <li>矩阵消失后, 屏幕会变为黑屏 (这就是 ISI, 刺激间隔)。</li>
      <li>之后第二个方格矩阵 (Pattern B) 会出现, 它<strong>要么和 A 完全相同,
          要么仅有 1 个格子不同</strong>。</li>
      <li>请<strong>尽快</strong>判断它们是否相同, 同时<strong>尽量保证准确</strong>。</li>
    </ol>

    <h2>反应方式</h2>
    <p>请将左手食指放在 <kbd style="background:#e5e5ea;padding:2px 8px;border-radius:4px;font-family:monospace">S</kbd>
       键上, 右手食指放在 <kbd style="background:#e5e5ea;padding:2px 8px;border-radius:4px;font-family:monospace">D</kbd> 键上:</p>
    <ul>
      <li>判断<strong>相同</strong> → 按 <kbd style="background:#e5e5ea;padding:2px 8px;border-radius:4px;font-family:monospace">S</kbd> 键 (Same)</li>
      <li>判断<strong>不同</strong> → 按 <kbd style="background:#e5e5ea;padding:2px 8px;border-radius:4px;font-family:monospace">D</kbd> 键 (Different)</li>
    </ul>
    <p>也可以用鼠标点击屏幕下方的按钮, 但<strong>键盘反应更准确</strong>。</p>

    <div class="info-box">
      <strong>请注意:</strong>
      <ul style="margin: 6px 0 0 0;">
        <li>有时候 Pattern B 会出现在与 A 略有偏移的位置 (整体平移一格), 但你只需判断
            "图案本身"是否相同, <strong>不需要考虑位置</strong>。</li>
        <li>如果不确定, 也请凭直觉做出反应, <strong>不要不反应</strong>。</li>
        <li>在主实验阶段不会有对错反馈, 但练习阶段会告知正误。</li>
      </ul>
    </div>

    <p>下面会先进行 ${CONFIG.practiceTrialCount} 次<strong>练习试次</strong>
       (有反馈), 然后正式开始。</p>

    <div class="btn-row">
      <button class="btn-secondary btn" onclick="showScreen('settings')">← 返回</button>
      <button class="btn" onclick="startPractice()">开始练习 →</button>
    </div>
  `;
  app.appendChild(div);
}

function startPractice() {
  state.isPractice = true;
  state.practiceIdx = 0;
  state.screen = 'practice';
  render();
  // 给被试一点时间看到黑屏后, 开始练习
  setTimeout(() => runNextTrial(), 600);
}

function startMainExperiment() {
  state.isPractice = false;
  state.currentTrialIdx = 0;
  state.screen = 'experiment';
  render();
  setTimeout(() => runNextTrial(), 600);
}

/* ---------- 实验屏幕 (黑屏) ---------- */
function renderExperimentScreen() {
  const app = document.getElementById('app');
  const div = document.createElement('div');
  div.className = 'experiment-screen';
  div.id = 'experimentScreen';
  div.innerHTML = `
    <div class="progress-bar" id="progressBar"></div>
    <div class="stim-area" id="stimArea"></div>
  `;
  app.appendChild(div);
  updateProgress();
}

function updateProgress() {
  const bar = document.getElementById('progressBar');
  if (!bar) return;
  if (state.isPractice) {
    bar.textContent = `练习: ${state.practiceIdx + 1} / ${state.practiceTrials.length}`;
  } else {
    bar.textContent = `试次: ${state.currentTrialIdx + 1} / ${state.trials.length}`;
  }
}

/* ---------- 试次执行 ---------- */
async function runNextTrial() {
  const trial = state.isPractice
    ? state.practiceTrials[state.practiceIdx]
    : state.trials[state.currentTrialIdx];

  if (!trial) {
    // 结束
    if (state.isPractice) {
      finishPractice();
    } else {
      finishExperiment();
    }
    return;
  }

  updateProgress();

  // 1. 生成矩阵
  trial.matrix1 = generateMatrix(trial.size);
  trial.matrix2 = trial.same ? copyMatrix(trial.matrix1) : flipOneCell(trial.matrix1);

  // 2. 注视点
  await showFixation();

  // 3. Pattern A
  await showPattern(trial.matrix1, false, CONFIG.patternDuration);

  // 4. ISI (黑屏)
  await showBlank(trial.isi);

  // 5. Pattern B + 等待反应
  const result = await showPatternAndWaitResponse(trial.matrix2, trial.shift);
  trial.response = result.response;
  trial.rt = result.rt;
  trial.correct = (trial.response === 'same') === trial.same;

  // 6. 反馈 (仅练习)
  if (state.isPractice) {
    await showFeedback(trial.correct);
  }

  // 7. ITI
  await showBlank(CONFIG.interTrialInterval);

  // 8. 进入下一试次, 或休息
  if (state.isPractice) {
    state.practiceIdx++;
  } else {
    state.currentTrialIdx++;
    // 每 N 试次休息一次
    if (state.currentTrialIdx > 0 &&
        state.currentTrialIdx % CONFIG.breakInterval === 0 &&
        state.currentTrialIdx < state.trials.length) {
      await showBreak();
    }
  }

  runNextTrial();
}

function showFixation() {
  return new Promise(resolve => {
    const stim = document.getElementById('stimArea');
    stim.innerHTML = `<div class="fixation">+</div>`;
    setTimeout(resolve, CONFIG.fixationDuration);
  });
}

function showBlank(duration) {
  return new Promise(resolve => {
    const stim = document.getElementById('stimArea');
    if (stim) stim.innerHTML = '';
    setTimeout(resolve, duration);
  });
}

function showPattern(matrix, shifted, duration) {
  return new Promise(resolve => {
    const stim = document.getElementById('stimArea');
    stim.innerHTML = '';
    const size = matrix.length;
    const cellSize = size === 5 ? CONFIG.cellSizeFor5 : CONFIG.cellSizeFor8;
    const totalSize = size * cellSize + (size - 1) * CONFIG.cellGap;
    // SVG 宽度留出位移空间 (左右各留 1 个 cellSize)
    const svgWidth = totalSize + cellSize * 2 + 40;
    const svgHeight = totalSize + 40;

    const svg = d3.select(stim).append('svg')
      .attr('width', svgWidth)
      .attr('height', svgHeight);

    const shiftPx = shifted ? cellSize + CONFIG.cellGap : 0;
    renderMatrix(svg, matrix, { cellSize, shiftPx });

    setTimeout(resolve, duration);
  });
}

function showPatternAndWaitResponse(matrix, shifted) {
  return new Promise(resolve => {
    const stim = document.getElementById('stimArea');
    stim.innerHTML = '';
    const size = matrix.length;
    const cellSize = size === 5 ? CONFIG.cellSizeFor5 : CONFIG.cellSizeFor8;
    const totalSize = size * cellSize + (size - 1) * CONFIG.cellGap;
    const svgWidth = totalSize + cellSize * 2 + 40;
    const svgHeight = totalSize + 40;

    const svg = d3.select(stim).append('svg')
      .attr('width', svgWidth)
      .attr('height', svgHeight);

    const shiftPx = shifted ? cellSize + CONFIG.cellGap : 0;
    renderMatrix(svg, matrix, { cellSize, shiftPx });

    // 显示反应提示
    const screen = document.getElementById('experimentScreen');
    const promptDiv = document.createElement('div');
    promptDiv.className = 'response-prompt';
    promptDiv.innerHTML = `
      <div>请判断: 两个图案是否相同?</div>
      <div class="keys">
        <div class="key" id="resp-same"><kbd>S</kbd>相同 (Same)</div>
        <div class="key" id="resp-diff"><kbd>D</kbd>不同 (Different)</div>
      </div>
    `;
    screen.appendChild(promptDiv);

    const startTime = performance.now();
    let resolved = false;

    function handleResponse(resp) {
      if (resolved) return;
      resolved = true;
      const rt = performance.now() - startTime;
      cleanup();
      resolve({ response: resp, rt });
    }

    function onKeyDown(e) {
      const key = e.key.toLowerCase();
      if (key === CONFIG.sameKey) handleResponse('same');
      else if (key === CONFIG.diffKey) handleResponse('diff');
    }

    function cleanup() {
      document.removeEventListener('keydown', onKeyDown);
      promptDiv.remove();
    }

    document.addEventListener('keydown', onKeyDown);
    document.getElementById('resp-same').addEventListener('click', () => handleResponse('same'));
    document.getElementById('resp-diff').addEventListener('click', () => handleResponse('diff'));
  });
}

function showFeedback(correct) {
  return new Promise(resolve => {
    const stim = document.getElementById('stimArea');
    stim.innerHTML = `<div class="feedback ${correct ? 'correct' : 'wrong'}">
      ${correct ? '✓ 正确' : '✗ 错误'}
    </div>`;
    setTimeout(() => {
      stim.innerHTML = '';
      resolve();
    }, CONFIG.feedbackDuration);
  });
}

function showBreak() {
  return new Promise(resolve => {
    const screen = document.getElementById('experimentScreen');
    const stim = document.getElementById('stimArea');
    stim.innerHTML = `
      <div class="break-screen">
        <h2>请稍作休息</h2>
        <p>已完成 ${state.currentTrialIdx} / ${state.trials.length} 试次</p>
        <p style="margin-top: 30px;">准备好后, 按空格键继续</p>
      </div>
    `;
    function onKey(e) {
      if (e.key === ' ' || e.code === 'Space') {
        document.removeEventListener('keydown', onKey);
        stim.innerHTML = '';
        // 短暂延迟以避免立即开始
        setTimeout(resolve, 500);
      }
    }
    document.addEventListener('keydown', onKey);
  });
}

function finishPractice() {
  // 显示练习完成提示
  const stim = document.getElementById('stimArea');
  const correct = state.practiceTrials.filter(t => t.correct).length;
  stim.innerHTML = `
    <div class="break-screen">
      <h2>练习结束</h2>
      <p>练习正确率: ${correct} / ${state.practiceTrials.length}
         (${Math.round(correct / state.practiceTrials.length * 100)}%)</p>
      <p style="margin-top: 30px;">准备好后, 按空格键开始正式实验</p>
    </div>
  `;
  function onKey(e) {
    if (e.key === ' ' || e.code === 'Space') {
      document.removeEventListener('keydown', onKey);
      startMainExperiment();
    }
  }
  document.addEventListener('keydown', onKey);
}

function finishExperiment() {
  showScreen('results');
}

/* ---------- 结果分析与可视化 ---------- */
function aggregateResults(trials) {
  // 按 (size, shift, isi) 聚合, 计算正确率
  const groups = d3.group(trials, d => `${d.size}|${d.shift}|${d.isi}`);
  const result = [];
  for (const [key, group] of groups) {
    const [size, shift, isi] = key.split('|');
    const accuracy = d3.mean(group, d => d.correct ? 1 : 0);
    const meanRt = d3.mean(group, d => d.rt);
    result.push({
      size: +size,
      shift: shift === 'true',
      isi: +isi,
      accuracy: accuracy * 100,
      meanRt,
      n: group.length,
    });
  }
  return result;
}

function renderResults() {
  const app = document.getElementById('app');
  const div = document.createElement('div');
  div.className = 'menu-screen';
  div.style.maxWidth = '1100px';

  const trials = state.trials;
  const totalCorrect = trials.filter(t => t.correct).length;
  const overallAcc = (totalCorrect / trials.length * 100).toFixed(1);
  const meanRt = (d3.mean(trials, t => t.rt) || 0).toFixed(0);

  div.innerHTML = `
    <h1>实验结果</h1>
    <div class="subtitle">被试: ${state.config.participantId} ·
       共完成 ${trials.length} 个试次</div>

    <h2>总体表现</h2>
    <div class="results-grid">
      <div class="stat-card">
        <div class="label">总正确率</div>
        <div class="value">${overallAcc}%</div>
      </div>
      <div class="stat-card">
        <div class="label">平均反应时</div>
        <div class="value">${meanRt} ms</div>
      </div>
    </div>

    <h2>正确率随 ISI 与条件变化 (Phillips 1974 风格)</h2>
    <div id="resultsChart"></div>

    <h2>分条件统计表</h2>
    <div id="resultsTable"></div>

    <h2>结论与讨论</h2>
    <p>请根据上方实验数据, 写下你的结论。可以参考以下问题:</p>
    <ul>
      <li>位移条件 (still vs move) 在什么 ISI 下差异最大?</li>
      <li>矩阵复杂度 (5×5 vs 8×8) 对正确率有何影响?</li>
      <li>结果是否支持模板说? 若支持, 在何种条件下? 若不完全支持, 还需要什么理论补充?</li>
    </ul>
    <textarea class="conclusion-area" id="conclusion"
      placeholder="基于本次实验的数据, 我们的结论是..."></textarea>

    <div class="btn-row">
      <button class="btn" onclick="exportData()">导出数据 (CSV)</button>
      <button class="btn-secondary btn" onclick="exportConclusion()">导出结论 (TXT)</button>
      <button class="btn-secondary btn" onclick="restartExperiment()">重新开始</button>
    </div>
  `;
  app.appendChild(div);

  drawResultsChart();
  renderResultsTable();
}

function drawResultsChart() {
  const aggregated = aggregateResults(state.trials);
  const container = d3.select('#resultsChart');
  container.selectAll('*').remove();

  const margin = { top: 30, right: 180, bottom: 60, left: 70 };
  const width = 880 - margin.left - margin.right;
  const height = 420 - margin.top - margin.bottom;

  const svg = container.append('svg')
    .attr('width', width + margin.left + margin.right)
    .attr('height', height + margin.top + margin.bottom);

  const g = svg.append('g')
    .attr('transform', `translate(${margin.left},${margin.top})`);

  // 标题
  svg.append('text')
    .attr('class', 'chart-title')
    .attr('x', (width + margin.left + margin.right) / 2)
    .attr('y', 20)
    .attr('text-anchor', 'middle')
    .text('再认正确率 × ISI × 矩阵复杂度 × 位移条件');

  // 按 (size, shift) 分线
  const lineKeys = [];
  for (const size of state.config.sizes) {
    for (const shift of (state.config.includeShift ? [false, true] : [false])) {
      lineKeys.push({ size, shift });
    }
  }

  // 比例尺: x 轴用对数 (因为 ISI 跨越多个数量级会更易读),
  // 但为了贴近 Phillips 原文且数据点少, 用线性也清晰. 这里用线性.
  const xScale = d3.scalePoint()
    .domain(state.config.isis)
    .range([0, width])
    .padding(0.5);

  const yScale = d3.scaleLinear()
    .domain([40, 100])
    .range([height, 0]);

  // Grid
  g.append('g')
    .attr('class', 'grid')
    .call(d3.axisLeft(yScale).tickSize(-width).tickFormat(''))
    .select('.domain').remove();

  // X 轴
  g.append('g')
    .attr('class', 'axis')
    .attr('transform', `translate(0,${height})`)
    .call(d3.axisBottom(xScale).tickFormat(d => (d / 1000).toFixed(2)));

  g.append('text')
    .attr('class', 'axis-label')
    .attr('x', width / 2)
    .attr('y', height + 45)
    .attr('text-anchor', 'middle')
    .text('刺激间隔 ISI (秒)');

  // Y 轴
  g.append('g')
    .attr('class', 'axis')
    .call(d3.axisLeft(yScale).tickFormat(d => d + '%'));

  g.append('text')
    .attr('class', 'axis-label')
    .attr('transform', 'rotate(-90)')
    .attr('y', -50)
    .attr('x', -height / 2)
    .attr('text-anchor', 'middle')
    .text('再认正确率 (%)');

  // 50% 参考线 (chance level)
  g.append('line')
    .attr('x1', 0).attr('x2', width)
    .attr('y1', yScale(50)).attr('y2', yScale(50))
    .attr('stroke', '#ff453a')
    .attr('stroke-dasharray', '4,4')
    .attr('stroke-width', 1);
  g.append('text')
    .attr('x', width - 4)
    .attr('y', yScale(50) - 4)
    .attr('text-anchor', 'end')
    .attr('font-size', 11)
    .attr('fill', '#ff453a')
    .text('50% (随机水平)');

  // 颜色与线型
  function colorOf(size) {
    return size === 5 ? '#0071e3' : '#34c759';
  }
  function dashOf(shift) {
    return shift ? '5,4' : null;
  }

  // 画线
  const line = d3.line()
    .x(d => xScale(d.isi))
    .y(d => yScale(d.accuracy));

  for (const key of lineKeys) {
    const dataForLine = aggregated
      .filter(d => d.size === key.size && d.shift === key.shift)
      .sort((a, b) => a.isi - b.isi);
    if (dataForLine.length === 0) continue;

    g.append('path')
      .datum(dataForLine)
      .attr('fill', 'none')
      .attr('stroke', colorOf(key.size))
      .attr('stroke-width', 2)
      .attr('stroke-dasharray', dashOf(key.shift))
      .attr('d', line);

    // 数据点
    g.selectAll(`.dot-${key.size}-${key.shift}`)
      .data(dataForLine)
      .enter()
      .append('circle')
      .attr('cx', d => xScale(d.isi))
      .attr('cy', d => yScale(d.accuracy))
      .attr('r', 5)
      .attr('fill', colorOf(key.size))
      .attr('stroke', key.shift ? 'white' : 'none')
      .attr('stroke-width', 2);
  }

  // 图例
  const legend = svg.append('g')
    .attr('transform', `translate(${width + margin.left + 20}, ${margin.top})`);

  let yOff = 0;
  for (const key of lineKeys) {
    const g2 = legend.append('g').attr('transform', `translate(0, ${yOff})`);
    g2.append('line')
      .attr('x1', 0).attr('x2', 28)
      .attr('y1', 8).attr('y2', 8)
      .attr('stroke', colorOf(key.size))
      .attr('stroke-width', 2)
      .attr('stroke-dasharray', dashOf(key.shift));
    g2.append('circle')
      .attr('cx', 14).attr('cy', 8)
      .attr('r', 4)
      .attr('fill', colorOf(key.size));
    g2.append('text')
      .attr('class', 'legend-item')
      .attr('x', 36).attr('y', 12)
      .text(`${key.size}×${key.size} ${key.shift ? 'move (位移)' : 'still (重叠)'}`);
    yOff += 22;
  }
}

function renderResultsTable() {
  const aggregated = aggregateResults(state.trials);
  // 按 size, shift, isi 排序
  aggregated.sort((a, b) =>
    a.size - b.size ||
    (a.shift === b.shift ? 0 : a.shift ? 1 : -1) ||
    a.isi - b.isi
  );

  const container = document.getElementById('resultsTable');
  let html = `<table class="data-table">
    <thead>
      <tr>
        <th>矩阵尺寸</th>
        <th>位移条件</th>
        <th>ISI (ms)</th>
        <th>试次数</th>
        <th>正确率</th>
        <th>平均反应时 (ms)</th>
      </tr>
    </thead>
    <tbody>`;
  for (const row of aggregated) {
    html += `<tr>
      <td>${row.size}×${row.size}</td>
      <td>${row.shift ? 'move (位移)' : 'still (重叠)'}</td>
      <td>${row.isi}</td>
      <td>${row.n}</td>
      <td>${row.accuracy.toFixed(1)}%</td>
      <td>${(row.meanRt || 0).toFixed(0)}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  container.innerHTML = html;
}

/* ---------- 数据导出 ---------- */
function exportData() {
  const headers = ['trial_index', 'participant', 'size', 'isi_ms', 'shift', 'same_trial',
                   'response', 'correct', 'rt_ms'];
  const rows = [headers.join(',')];
  state.trials.forEach((t, i) => {
    rows.push([
      i + 1,
      state.config.participantId,
      t.size,
      t.isi,
      t.shift,
      t.same,
      t.response,
      t.correct,
      (t.rt || 0).toFixed(0),
    ].join(','));
  });
  const csv = rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const ts = new Date().toISOString().slice(0, 16).replace(/[:T]/g, '-');
  downloadFile(blob, `phillips1974_${state.config.participantId}_${ts}.csv`);
}

function exportConclusion() {
  const conclusion = document.getElementById('conclusion').value;
  const aggregated = aggregateResults(state.trials);
  let txt = `模式识别 - 模板说实验复现 (Phillips, 1974)\n`;
  txt += `被试: ${state.config.participantId}\n`;
  txt += `日期: ${new Date().toLocaleString('zh-CN')}\n`;
  txt += `总试次数: ${state.trials.length}\n`;
  txt += `总正确率: ${(state.trials.filter(t=>t.correct).length / state.trials.length * 100).toFixed(1)}%\n`;
  txt += `\n--- 分条件统计 ---\n`;
  aggregated.sort((a, b) => a.size - b.size || (a.shift?1:0) - (b.shift?1:0) || a.isi - b.isi);
  for (const r of aggregated) {
    txt += `${r.size}x${r.size} | ${r.shift ? 'move' : 'still'} | ISI=${r.isi}ms `
         + `| n=${r.n} | acc=${r.accuracy.toFixed(1)}% | RT=${(r.meanRt||0).toFixed(0)}ms\n`;
  }
  txt += `\n--- 结论 ---\n${conclusion || '(未填写)'}\n`;
  const blob = new Blob([txt], { type: 'text/plain;charset=utf-8;' });
  const ts = new Date().toISOString().slice(0, 16).replace(/[:T]/g, '-');
  downloadFile(blob, `phillips1974_conclusion_${state.config.participantId}_${ts}.txt`);
}

function downloadFile(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function restartExperiment() {
  if (!confirm('确定要清空当前数据并重新开始吗?')) return;
  state.trials = [];
  state.currentTrialIdx = 0;
  state.practiceIdx = 0;
  showScreen('welcome');
}

/* ---------- 启动 ---------- */
render();
</script>
</body>
</html>
